<script>
// Auto-migration: kept for legacy data
(function(){
try{
var raw=localStorage.getItem('ral-data-v5');
if(!raw)return;
var d=JSON.parse(raw);
if(!d||!d.categories||!d.channels)return;
var ch=false;

if(d.categories.length > 0 && d.categories[0].order === undefined){
  d.categories.forEach(function(c, i){ c.order = i; });
  ch=true;
}

if(!d.categories.find(function(c){return c.id==='cat-timesheets'})){
d.categories.splice(2,0,{id:'cat-timesheets',name:'Timesheets',emoji:'⏱️',system:'timesheets',collapsed:false,order:2});
ch=true;}
if(!d.channels.find(function(c){return c.id==='ts-overview'})){
d.channels.push({id:'ts-overview',type:'ts-overview',name:'worked-hours',categoryId:'cat-timesheets',createdAt:new Date().toISOString()});
ch=true;}
if(!d.channels.find(function(c){return c.id==='crew-roster'})){
d.channels.push({id:'crew-roster',type:'roster',name:'👷crew-roster',categoryId:'cat-crew',createdAt:new Date().toISOString()});
ch=true;}

// v6 migration: fix roster emoji if it was missing
var roster=d.channels.find(function(c){return c.id==='crew-roster'});
if(roster && !roster.name.match(/^[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}]/u)){
  roster.name='👷crew-roster';
  ch=true;
}

// v6 migration: fix tool emojis
var paintCh=d.channels.find(function(c){return c.id==='mat-paint'});
if(paintCh && paintCh.name !== '🎨paint'){ paintCh.name='🎨paint'; ch=true; }
var netCh=d.channels.find(function(c){return c.id==='mat-netting'});
if(netCh && netCh.name !== '🥅netting'){ netCh.name='🥅netting'; ch=true; }
var sealCh=d.channels.find(function(c){return c.id==='mat-sealant'});
if(sealCh && sealCh.name !== '🔫sealant'){ sealCh.name='🔫sealant'; ch=true; }

var cal=d.channels.find(function(c){return c.id==='crew-calendar'});
if(cal){
  cal.name = '📅work-calendar';
  ch=true;
}

var g=d.channels.find(function(c){return (c.id==='crew-general' || c.name==='anuncios') && c.categoryId==='cat-crew'});
if(g){
  g.name='📢announcements';
  g.whatsappLink='https://chat.whatsapp.com/ral-crew-announcements-demo';
  if(g.id==='crew-general') g.id='crew-announcements';
  ch=true;
}

var crewChannels = d.channels.filter(function(c){return c.categoryId==='cat-crew';});
if(crewChannels.length){
  var order = ['📢announcements','📅work-calendar','👷crew-roster'];
  crewChannels.sort(function(a,b){
    var aIdx = order.findIndex(function(n){return a.name.includes(n) || n.includes(a.name);});
    var bIdx = order.findIndex(function(n){return b.name.includes(n) || n.includes(b.name);});
    if(aIdx===-1) aIdx=999; if(bIdx===-1) bIdx=999;
    return aIdx - bIdx;
  });
  var otherChannels = d.channels.filter(function(c){return c.categoryId!=='cat-crew';});
  d.channels = otherChannels.concat(crewChannels);
  ch=true;
}

if(ch)localStorage.setItem('ral-data-v5',JSON.stringify(d));
}catch(e){console.warn('Migration error:',e);}
})();
</script>

function useStorage(key, init) {
const [val, setVal] = useState(() => {
try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : init; } catch { return init; }
});
useEffect(() => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }, [key, val]);
return [val, setVal];
}
function useTheme() {
const [theme, setTheme] = useState(() => { try { return localStorage.getItem('ral-theme') || 'light'; } catch { return 'light'; } });
useEffect(() => { document.documentElement.setAttribute('data-theme', theme); try { localStorage.setItem('ral-theme', theme); } catch {} }, [theme]);
return [theme, setTheme];
}
function useIsMobile() {
const [m, setM] = useState(() => typeof window !== 'undefined' && window.matchMedia('(max-width: 760px)').matches);
useEffect(() => {
  const mq = window.matchMedia('(max-width: 760px)');
  const h = () => setM(mq.matches);
  mq.addEventListener ? mq.addEventListener('change', h) : mq.addListener(h);
  return () => { mq.removeEventListener ? mq.removeEventListener('change', h) : mq.removeListener(h); };
}, []);
return m;
}
function formatDate(iso) { if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric'}); }
function formatShortDate(iso) { if(!iso) return '—'; return new Date(iso+'T00:00:00').toLocaleDateString('en-NZ', {day:'numeric',month:'short'}); }
function formatTime(iso) { if(!iso) return ''; return new Date(iso).toLocaleString('en-NZ', {day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }
function todayISO(){ const d = new Date(); return d.toISOString().slice(0,10); }
function addDays(iso, n) { const d = new Date(iso+'T00:00:00'); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); }
function daysBetween(a, b) { const d1 = new Date(a+'T00:00:00'); const d2 = new Date(b+'T00:00:00'); return Math.round((d2-d1)/(1000*60*60*24)); }
function datesFor(start, days) { const arr = []; for(let i = 0; i < days; i++) arr.push(addDays(start, i)); return arr; }
function calcHours(start, end) { if(!start || !end) return 0; const [sh,sm] = start.split(':').map(Number); const [eh,em] = end.split(':').map(Number); let mins = (eh*60+em) - (sh*60+sm); if(mins < 0) mins += 24*60; return Math.round(mins/60*100)/100; }
function monthsAgo(n) { const d = new Date(); d.setMonth(d.getMonth() - n); return d.toISOString().slice(0,10); }
function encodeObj(p) { try { const json = JSON.stringify(p); const b64 = btoa(unescape(encodeURIComponent(json))); return b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); } catch { return ''; } }
function decodeObj(str) { try { let b64 = str.replace(/-/g,'+').replace(/_/g,'/'); while(b64.length % 4) b64 += '='; const json = decodeURIComponent(escape(atob(b64))); return JSON.parse(json); } catch { return null; } }
function buildShareUrl(channel) { const base = window.location.origin + window.location.pathname; return `${base}#p=${encodeObj(channel)}`; }
function buildWhatsAppMessage(ch) {
const lines = [`📋 *${ch.name}*`, ''];
INFO_FIELDS.forEach(f => { const val = ch[f.key]; if(val) lines.push(`${f.emoji} *${f.label}:* ${val}`); });
if(ch.clientMobile) lines.push(`📱 *Client mobile:* ${ch.clientMobile}`);
if(ch.startDate) lines.push(`📅 *Start date:* ${formatDate(ch.startDate)}`);
lines.push(''); lines.push('🔗 *Project info:* ' + buildShareUrl(ch));
if(ch.surveyLink) lines.push('🔍 *Quick Survey:* ' + ch.surveyLink);
return lines.join('\n');
}
function buildRamsUrl(project) {
// Build a URL for the RAMS form with the project fields pre-filled via query params.
// The RAMS form at rams-beta.vercel.app needs to read these params and pre-fill.
const params = new URLSearchParams();
if(project.name) params.set('projectName', project.name);
if(project.address) params.set('location', project.address);
if(project.teamLeader) params.set('teamLeader', project.teamLeader);
if(project.startDate) params.set('date', new Date(project.startDate+'T00:00:00').toLocaleDateString('en-NZ'));
if(project.clientName) params.set('client1Name', project.clientName);
if(project.clientMobile) params.set('client1Mobile', project.clientMobile);
// Also pass a project reference so RAMS can tag it if it wants
params.set('projectRef', project.id);
return RAMS_URL + '?' + params.toString();
}
function slugify(name){ return name.toLowerCase().replace(/[^\w]+/g,'-').replace(/^-|-$/g,''); }
function renderWithMentions(text, channels, onMentionClick) {
if(!text) return null;
const parts = text.split(/(#[\w-]+)/g);
return parts.map((part, i) => {
if(part.startsWith('#')) {
const slug = part.slice(1).toLowerCase();
const ch = channels.find(c => slugify(c.name) === slug);
if(ch) return <a key={i} className="mention" onClick={(e) => { e.preventDefault(); onMentionClick(ch.id); }}>{part}</a>;
}
return part;
});
}
function pickProjectColor(allProjects) {
const usedByRunning = new Set(allProjects.filter(p => p.status !== 'done' && p.colorId).map(p => p.colorId));
const available = PROJECT_COLORS.find(c => !usedByRunning.has(c.id));
if(available) return available.id;
return PROJECT_COLORS[0].id;
}
function getColor(colorId) { return PROJECT_COLORS.find(c => c.id === colorId) || PROJECT_COLORS[0]; }

function useMentions(text, setText, allChannels, currentChannelId, filterToToolsOnly = false) {
const [open, setOpen] = useState(false); const [query, setQuery] = useState(''); const [pos, setPos] = useState(0); const [activeIdx, setActiveIdx] = useState(0);
const matches = useMemo(() => {
if(!open) return []; const q = query.toLowerCase(); let filtered = allChannels.filter(c => c.id !== currentChannelId);
if(filterToToolsOnly) { filtered = filtered.filter(c => c.categoryId === 'cat-tools'); }
return filtered.filter(c => slugify(c.name).includes(q) || c.name.toLowerCase().includes(q)).slice(0,8);
}, [open, query, allChannels, currentChannelId, filterToToolsOnly]);
useEffect(() => { setActiveIdx(0); }, [query]);
const handleChange = (e) => { const v = e.target.value; setText(v); const cursor = e.target.selectionStart; const before = v.slice(0, cursor); const m = before.match(/#([\w-]*)$/); if(m) { setOpen(true); setQuery(m[1]); setPos(cursor - m[0].length); } else { setOpen(false); } };
const insert = (channel, ref) => { const slug = slugify(channel.name); const before = text.slice(0, pos); const after = text.slice(pos + 1 + query.length); const newText = before + '#' + slug + ' ' + after; setText(newText); setOpen(false); setTimeout(() => { if(ref?.current) { const nc = (before + '#' + slug + ' ').length; ref.current.focus(); ref.current.setSelectionRange(nc, nc); } }, 0); };
const handleKeyDown = (e, ref) => { if(!open || matches.length === 0) return false; if(e.key === 'ArrowDown'){ e.preventDefault(); setActiveIdx(i => (i+1) % matches.length); return true; } if(e.key === 'ArrowUp'){ e.preventDefault(); setActiveIdx(i => (i-1+matches.length) % matches.length); return true; } if(e.key === 'Enter' || e.key === 'Tab'){ e.preventDefault(); insert(matches[activeIdx], ref); return true; } if(e.key === 'Escape'){ e.preventDefault(); setOpen(false); return true; } return false; };
return {open, matches, activeIdx, setActiveIdx, insert, handleChange, handleKeyDown, close:()=>setOpen(false)};
}

return (<div key={c.id} style={{...s.mentionItem, ...(isActive ? s.mentionItemActive : {})}} onMouseEnter={() => mentions.setActiveIdx(i)} onClick={() => mentions.insert(c, inputRef)}><span style={s.mentionItemHash}>{hash}</span><span>{c.name}</span><span style={s.mentionItemMeta}>{cat?.name || ''}</span></div>); })}

}

function InstallButton() {
const [installAvail, setInstallAvail] = useState(typeof window!=='undefined' && window.__ralInstallAvailable===true);
const [installing, setInstalling] = useState(false);
useEffect(() => {
  const a = () => setInstallAvail(true);
  const d = () => setInstallAvail(false);
  window.addEventListener('ral-install-available', a);
  window.addEventListener('ral-install-done', d);
  return () => { window.removeEventListener('ral-install-available', a); window.removeEventListener('ral-install-done', d); };
}, []);
const isStandalone = typeof window!=='undefined' && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true);
const isIOS = typeof navigator!=='undefined' && /iPad|iPhone|iPod/.test(navigator.userAgent);
if(isStandalone) return null;
const doInstall = async () => { if(!window.__ralInstallApp) return; setInstalling(true); try{ await window.__ralInstallApp(); }catch(e){} setInstalling(false); };
if(installAvail) {
  return (<button style={{...s.actionBtn, background:'var(--accent-bg)', color:'var(--accent-text)', border:'1px solid var(--accent)', fontWeight:700}} onClick={doInstall} disabled={installing}>{installing ? 'INSTALLING...' : '⬇ INSTALL APP'}</button>);
}

  return (<div style={{padding:'8px 10px',background:'var(--bg-raised)',border:'1px solid var(--border)',borderRadius:6,fontSize:10,color:'var(--text-dim)',lineHeight:1.4,fontFamily:"'JetBrains Mono',monospace"}}>iOS: tap <b>Share</b> → <b>Add to Home Screen</b></div>);
}
return null;
}

function AuthScreen({onLoginAdmin, onLoginCompany, companies}) {

const [password, setPassword] = useState('');

const submitAdmin = () => {
  setError('');
  if (email.trim().toLowerCase() === 'admin@tradehub.com' && password === 'admin123') {
    onLoginAdmin();
  } else {
    setError('Invalid admin credentials.');
  }
};

const submitCompany = () => {
  setError('');
  if (!selectedCompanyId) { setError('Pick a company.'); return; }
  const company = companies.find(c => c.id === selectedCompanyId);
  if (!company) { setError('Company not found.'); return; }
  const user = (company.users || []).find(u => u.email && u.email.toLowerCase() === email.trim().toLowerCase());

  if ((user.password || '1234') !== password) { setError('Wrong password.'); return; }

};

// ── CREATE/EDIT COMPANY MODAL ────────────────────────────────────────────────
function CompanyEditModal({onClose, onSave, editing}) {
const [name, setName] = useState(editing?.name || '');
const [logo, setLogo] = useState(editing?.logo || '');
const [managerName, setManagerName] = useState(editing?.users?.[0]?.name || '');
const [managerEmail, setManagerEmail] = useState(editing?.users?.[0]?.email || '');
const [managerPassword, setManagerPassword] = useState(editing?.users?.[0]?.password || '1234');

const onLogoUpload = (e) => {
  const file = e.target.files[0]; if (!file) return;
  if (file.size > 500 * 1024) { alert('Logo too big. Use an image under 500 KB.'); return; }
  const reader = new FileReader();
  reader.onload = (ev) => setLogo(ev.target.result);
  reader.readAsDataURL(file);
};

const save = () => {
  if (!name.trim()) return alert('Company name required.');
  if (!editing && (!managerName.trim() || !managerEmail.trim())) return alert('Manager name and email required for the first user.');
  const id = editing?.id || ('co-' + Date.now().toString(36));
  const users = editing?.users && editing.users.length
    ? editing.users.map((u,i) => i === 0 ? {...u, name: managerName.trim()||u.name, email: managerEmail.trim()||u.email, password: managerPassword||u.password||'1234'} : u)
    : [{id:'u-'+Date.now().toString(36), name:managerName.trim(), email:managerEmail.trim().toLowerCase(), password:managerPassword||'1234', role:'manager'}];
  onSave({id, name:name.trim(), logo, users, createdAt: editing?.createdAt || new Date().toISOString()});
};

return (
<div style={s.overlay} onClick={onClose}>
  <div style={s.modal} onClick={e=>e.stopPropagation()}>
    <div style={s.modalHeader}>
      <div>
        <div style={s.modalKicker}>{editing ? 'Edit' : 'New'} · Company</div>
        <div style={s.modalTitle}>{editing ? 'Edit company' : 'Create new company'}</div>
      </div>
      <button style={s.closeBtn} onClick={onClose}>×</button>
    </div>
    <div style={s.modalBody}>
      <label style={s.label}>Company name *</label>
      <input style={s.input} value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. RAL Solutions" autoFocus/>

        {logo && <button style={{...s.cancelBtn,color:'var(--danger)',borderColor:'var(--danger)'}} onClick={()=>setLogo('')}>Remove</button>}
      </div>
      {!editing && (
        <>
          <div style={{padding:'10px 12px',background:'var(--accent-bg)',border:'1px solid var(--accent)',borderRadius:7,marginBottom:14,fontSize:12,color:'var(--accent-text)'}}>

          </div>
          <label style={s.label}>Manager name *</label>

          <label style={s.label}>Manager email *</label>
          <input style={s.input} type="email" value={managerEmail} onChange={e=>setManagerEmail(e.target.value)} placeholder="lionel@ralsolutions.co.nz"/>

// ── ROOT APP ─────────────────────────────────────────────────────────────────
function RootApp() {
const [companies, setCompanies] = useStorage('th-companies', []);
const [session, setSession] = useStorage('th-session', null); // {kind:'admin'} | {kind:'company',companyId,userId}

// Theme has to live at root level so login screens get correct theme
useTheme();

const handleLoginAdmin = () => setSession({kind:'admin'});
const handleLoginCompany = (company, user) => setSession({kind:'company', companyId: company.id, userId: user.id});
const handleLogout = () => setSession(null);
const handleEnterCompany = (company) => {
  // Admin can enter any company as a "super-manager" (read-only-ish for now)
  const adminUser = {id:'admin-shadow', name:'Admin', email:'admin@tradehub.com', role:'manager'};
  setSession({kind:'company', companyId: company.id, userId: adminUser.id, _adminShadow:true});
};

if (!session) {
  return <AuthScreen onLoginAdmin={handleLoginAdmin} onLoginCompany={handleLoginCompany} companies={companies}/>;
}

if (session.kind === 'admin') {
  return <AdminPanel companies={companies} setCompanies={setCompanies} onLogout={handleLogout} onEnterCompany={handleEnterCompany}/>;
}

// Company session
const company = companies.find(c => c.id === session.companyId);
if (!company) {
  // Company was deleted while session active
  setTimeout(() => setSession(null), 0);
  return null;
}
let currentUser = (company.users || []).find(u => u.id === session.userId);
if (!currentUser && session._adminShadow) {
  currentUser = {id:'admin-shadow', name:'Admin (super)', email:'admin@tradehub.com', role:'manager'};
}
if (!currentUser) {
  setTimeout(() => setSession(null), 0);
  return null;
}

return <App company={company} currentUser={currentUser} onLogout={handleLogout}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<RootApp/>);
</script>

<script>
// ── PWA REGISTRATION & INSTALL PROMPT ───────────────────────────────────
(function(){
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => {
        document.addEventListener('visibilitychange', () => {
          if (document.visibilityState === 'visible') reg.update();
        });
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing; if (!nw) return;
          nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('SKIP_WAITING');
          });
        });
      })
      .catch(err => console.warn('SW registration failed:', err));
    let reloaded = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloaded) return; reloaded = true; window.location.reload();
    });
  });

  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    window.__ralInstallAvailable = true;
    window.dispatchEvent(new CustomEvent('ral-install-available'));
  });
  window.__ralInstallApp = async function() {
    if (!deferredPrompt) return false;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null; window.__ralInstallAvailable = false;
    window.dispatchEvent(new CustomEvent('ral-install-done', { detail: outcome }));
    return outcome === 'accepted';
  };
  window.addEventListener('appinstalled', () => {
    deferredPrompt = null; window.__ralInstallAvailable = false;
    window.dispatchEvent(new CustomEvent('ral-install-done', { detail: 'installed' }));
  });
})();
</script>
</body>
</html>
